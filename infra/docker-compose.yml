# Local development infrastructure for v0.
# Postgres is used by the api; Redis is started but NOT wired into code yet
# (reserved for v2: Pub/Sub across multiple backend instances).
#
# Credentials come from the root .env (see .env.example). Defaults are provided
# via ${VAR:-default} so `docker compose up` works even without an .env file.

services:
  postgres:
    image: postgres:16
    container_name: support-widget-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-support}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-support}
      POSTGRES_DB: ${POSTGRES_DB:-support_widget}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      # pg_isready exits 0 once the server accepts connections.
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-support} -d ${POSTGRES_DB:-support_widget}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: support-widget-redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
